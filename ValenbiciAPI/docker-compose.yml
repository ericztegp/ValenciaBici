version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: valenbici-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456789
      MYSQL_DATABASE: valenbicibd
      MYSQL_USER: valenbici_user
      MYSQL_PASSWORD: Valenbici2024!
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: valenbici-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8082:80"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  miphp:
    build: .
    container_name: valenbici-miphp
    ports:
      - "8081:80"
    volumes:
      - ./miweb:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
